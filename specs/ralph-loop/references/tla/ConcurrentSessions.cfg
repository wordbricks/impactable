CONSTANTS
    Sessions = {"s1", "s2", "s3"}
    WorktreeSlots = {"w1", "w2", "w3"}
    PortRange = {"p1", "p2", "p3"}

SYMMETRY SessionSymmetry
    \* Sessions, WorktreeSlots, PortRange are interchangeable — cuts state space

INIT Init
NEXT Next

INVARIANTS
    TypeInvariant
    WorktreeExclusion
    PortExclusion
    RunningHasResources
    OwnershipConsistency
    NoResourceLeak

PROPERTIES
    AllSessionsTerminate
    AllWorktreesFreed
    AllPortsFreed
